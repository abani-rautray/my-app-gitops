apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: my-app
          image: ghcr.io/abani-rautray/my-app:8769fb7e482769e31e0b86fb6c4d037eecf259b9
          ports:
            - containerPort: 8080

apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: my-app
          image: ghcr.io/abani-rautray/my-app:b605f8a68c1331488611a5bc5fd945491522d6ac
          ports:
            - containerPort: 8080
